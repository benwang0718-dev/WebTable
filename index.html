<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robot Expo Registration</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <section class="intro" aria-labelledby="pageTitle">
      <div class="expo-badge">Robot Expo 2026</div>
      <h1 id="pageTitle">機器人展覽報名表</h1>
      <p>填寫資料完成預約，現場可體驗 AI 機械手臂、智慧服務機器人與自動化展示。</p>

      <div class="robot-stage" aria-hidden="true">
        <div class="robot-head">
          <span class="eye"></span>
          <span class="eye"></span>
        </div>
        <div class="robot-body">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </section>

    <main class="form-panel">
      <div class="panel-heading">
        <span>Entry Pass</span>
        <strong>參觀者資料</strong>
      </div>

      <form id="profileForm">
        <label class="field">
          <span>姓名</span>
          <input id="name" name="name" type="text" autocomplete="name" placeholder="請輸入姓名" required>
        </label>

        <label class="field">
          <span>Gmail</span>
          <input id="gmail" name="gmail" type="email" inputmode="email" autocomplete="email" placeholder="name@gmail.com" required>
        </label>

        <label class="field">
          <span>性別</span>
          <select id="gender" name="gender" required>
            <option value="">請選擇</option>
            <option value="male">男</option>
            <option value="female">女</option>
            <option value="other">其他</option>
            <option value="prefer_not_to_say">不透露</option>
          </select>
        </label>

        <button id="submitButton" class="submit-button" type="submit">
          <span class="button-icon" aria-hidden="true"></span>
          <span class="button-text">送出報名</span>
        </button>
      </form>

      <div id="message" class="message" aria-live="polite"></div>
    </main>
  </div>
</body>
</html>
