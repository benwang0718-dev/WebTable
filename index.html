<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robot Expo Registration</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <section class="intro" aria-labelledby="pageTitle">
      <div class="expo-badge">Robot Expo 2026</div>
      <h1 id="pageTitle">&#27231;&#22120;&#20154;&#23637;&#35261;&#22577;&#21517;&#34920;</h1>
      <p>&#22635;&#23531;&#36039;&#26009;&#23436;&#25104;&#38928;&#32004;&#65292;&#29694;&#22580;&#21487;&#39636;&#39511; AI &#27231;&#26800;&#25163;&#33218;&#12289;&#26234;&#24935;&#26381;&#21209;&#27231;&#22120;&#20154;&#33287;&#33258;&#21205;&#21270;&#23637;&#31034;&#12290;</p>

      <div class="robot-stage" aria-hidden="true">
        <div class="robot-head">
          <span class="eye"></span>
          <span class="eye"></span>
        </div>
        <div class="robot-body">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </section>

    <main class="form-panel">
      <div class="panel-heading">
        <span>Entry Pass</span>
        <strong>&#21443;&#35264;&#32773;&#36039;&#26009;</strong>
      </div>

      <form id="profileForm">
        <label class="field">
          <span>&#22995;&#21517;</span>
          <input id="name" name="name" type="text" autocomplete="name" placeholder="&#35531;&#36664;&#20837;&#22995;&#21517;" required>
        </label>

        <label class="field">
          <span>Gmail</span>
          <input id="gmail" name="gmail" type="email" inputmode="email" autocomplete="email" placeholder="name@gmail.com" required>
        </label>

        <label class="field">
          <span>&#24615;&#21029;</span>
          <select id="gender" name="gender" required>
            <option value="">&#35531;&#36984;&#25799;</option>
            <option value="male">&#30007;</option>
            <option value="female">&#22899;</option>
            <option value="other">&#20854;&#20182;</option>
            <option value="prefer_not_to_say">&#19981;&#36879;&#38706;</option>
          </select>
        </label>

        <button id="submitButton" class="submit-button" type="submit">
          <span class="button-icon" aria-hidden="true"></span>
          <span class="button-text">&#36865;&#20986;&#22577;&#21517;</span>
        </button>
      </form>

      <div id="message" class="message" aria-live="polite"></div>
    </main>
  </div>
</body>
</html>
